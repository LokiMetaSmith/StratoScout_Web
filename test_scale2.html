<!DOCTYPE html>
<html>
<head>
    <style>
        .slide-wrapper {
            position: relative;
            width: 100%;
            max-width: 1000px;
            padding-top: 56.25%; /* 16:9 aspect ratio */
            overflow: hidden;
        }
        .slide-iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="slide-wrapper">
        <iframe src="slides_html/slide_3.html" class="slide-iframe" scrolling="no"></iframe>
    </div>
</body>
</html>
