    <g transform="matrix(1, 0, 0, 1, 45, 134.13188)"><text font-family="WenQuanYi Zen Hei" font-style="normal" font-weight="normal" font-stretch="normal" font-size="15pt" fill="#FFFFFF" x="36" y="295.59442"><tspan x="8" y="26.794403">●</tspan><tspan x="36.05" y="26.794403" stroke="#FFFFFF" stroke-width="0.3pt" font-weight="normal">Autonomous gliding drones were recently proven</tspan><tspan x="457.3" y="26.794403" textLength="296.875" xml:space="preserve"> in the last year or so, allowing for</tspan><tspan xml:space="preserve" x="754.175" y="26.794403" textLength="6"> </tspan><tspan x="36" y="65.194405">efficient recovery enabling a solution like this</tspan><tspan x="8" y="103.594406">●</tspan><tspan x="36.05" y="103.594406">Many geospatial intelligence</tspan><tspan xml:space="preserve" x="283.05" y="103.594406"> </tspan><tspan x="289.05" y="103.594406" textLength="506.125" stroke="#FFFFFF" stroke-width="0.3pt" font-weight="normal">products have been focused on continuous satalite based</tspan><tspan xml:space="preserve" x="795.175" y="103.594406" textLength="6" stroke="#FFFFFF" stroke-width="0.3pt" font-weight="normal"> </tspan><tspan x="36" y="141.99442" stroke="#FFFFFF" stroke-width="0.3pt" font-weight="normal">monitoring</tspan><tspan x="127.625" y="141.99442" textLength="390.875">, rather than on-demand high altitude drones</tspan><tspan x="8" y="180.39441">●</tspan><tspan x="36.05" y="180.39441">Emergency management is a niche industry where the drone products</tspan><tspan xml:space="preserve" x="643.675" y="180.39441"> </tspan><tspan x="649.675" y="180.39441" textLength="134" stroke="#FFFFFF" stroke-width="0.3pt" font-weight="normal">main focus has</tspan><tspan xml:space="preserve" x="783.675" y="180.39441" textLength="6" stroke="#FFFFFF" stroke-width="0.3pt" font-weight="normal"> </tspan><tspan x="36" y="218.7944" stroke="#FFFFFF" stroke-width="0.3pt" font-weight="normal">been post-event information</tspan><tspan x="281" y="218.7944" textLength="213.875" xml:space="preserve"> rather than preventative</tspan><tspan x="8" y="257.1944">●</tspan><tspan x="36.05" y="257.1944">The light-weight low cost of these drones makes them more</tspan><tspan xml:space="preserve" x="557.925" y="257.1944"> </tspan><tspan x="563.925" y="257.1944" textLength="99.5" stroke="#FFFFFF" stroke-width="0.3pt" font-weight="normal">expendable</tspan><tspan x="663.425" y="257.1944" textLength="130" xml:space="preserve"> than high cost</tspan><tspan xml:space="preserve" x="793.425" y="257.1944" textLength="6"> </tspan><tspan x="36" y="295.59442">alternatives</tspan></text></g><text font-family="Arial, DejaVu Serif" font-style="normal" font-weight="normal" font-stretch="normal" font-size="18pt" fill="#FFD8CF" fill-opacity="0.75" x="371.5" y="227.70703"><tspan x="371.28787" y="227.4949" textLength="217" font-weight="bold" id="tp_0_shadow" fill="#000000">Evaluation only.</tspan><tspan x="371.5" y="227.70703" textLength="217" font-weight="bold" id="tp_0">Evaluation only.</tspan><tspan x="124.287865" y="255.69022" textLength="711" font-weight="bold" id="tp_1_shadow" fill="#000000">Created with Aspose.Slides for Python via .NET 26.6.</tspan><tspan x="124.5" y="255.90234" textLength="711" font-weight="bold" id="tp_1">Created with Aspose.Slides for Python via .NET 26.6.</tspan><tspan x="233.78787" y="283.88553" textLength="492" font-weight="bold" id="tp_2_shadow" fill="#000000">Copyright 2004-2026Aspose Pty Ltd.</tspan><tspan x="234" y="284.09766" textLength="492" font-weight="bold" id="tp_2">Copyright 2004-2026Aspose Pty Ltd.</tspan></text></g>
