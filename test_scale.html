<!DOCTYPE html>
<html>
<head>
    <style>
        .slide-wrapper {
            width: 100%;
            max-width: 1000px;
            border: 1px solid red;
            overflow: hidden;
            position: relative;
            aspect-ratio: 1280 / 720;
        }
        .slide-iframe {
            width: 1280px;
            height: 720px;
            border: none;
            transform: scale(0.78125); /* 1000 / 1280 */
            transform-origin: top left;
        }
    </style>
</head>
<body>
    <div class="slide-wrapper">
        <iframe src="slides_html/slide_3.html" class="slide-iframe" scrolling="no"></iframe>
    </div>
</body>
</html>
